{% extends "base.html" %}
{% block title %}设置 · 今日航线{% endblock %}
{% block page %}settings{% endblock %}
{% block content %}
<section class="hero compact"><div><p class="eyebrow">LOCAL FIRST</p><h1>任务设置</h1><p>只改真正影响每日清单的几件事。</p></div><span class="status {{ 'success' if ai_enabled else '' }}">AI {{ '已连接' if ai_enabled else '未配置' }}</span></section>
<section class="panel">
  <form id="settings-form" class="settings-form">
    <div class="form-grid"><label>当前阶段<input name="current_stage" required maxlength="100"></label><label>AI 项目每周上限<input name="ai_project_weekly_frequency" type="number" min="0" max="7"></label></div>
    <label class="alert-check"><input name="rehab_enabled" type="checkbox"><span><strong>启用康复任务</strong><small>异常日仍会由本地安全规则自动停用</small></span></label>
    <h2>任务名称</h2><div id="task-title-fields" class="form-grid"></div>
    <button class="primary" type="submit">保存设置</button>
  </form>
  <div class="config-note"><h3>DeepSeek 连接</h3><p>密钥只从 <code>.env</code> 读取，设置页不会显示或保存它。复制 <code>.env.example</code> 后填写接口即可启用。</p></div>
</section>
{% endblock %}
